name: Build SuperTux-PS2

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: 
      image: ps2dev/ps2dev:v1.0
      options: --user root

    steps:
      - name: Install Git and Toolchain Dependencies
        run: |
          apk update
          apk add --no-cache git make gcc g++ musl-dev

      # Fixes the "dubious ownership" error in the container
      - name: Fix Git Permissions
        run: git config --global --add safe.directory /__w/supertux-ps2/supertux-ps2

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build with Makefile.ps2
        run: |
          # If Makefile.ps2 is in the root, we run it directly.
          # We use -f to specify the filename since it's not named 'Makefile'.
          make -f Makefile.ps2 -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperTux-PS2-Binary
          path: |
            *.elf
            *.irx
            bin/*.elf
