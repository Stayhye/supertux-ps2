name: Build SuperTux-PS2

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: 
      image: ps2dev/ps2dev:v1.0
      options: --user root

    steps:
      - name: Install Build Essentials
        run: |
          apk update
          apk add --no-cache git cmake make gcc g++ musl-dev

      # Force Git to trust the workspace path
      - name: Fix Git Permissions
        run: git config --global --add safe.directory /__w/supertux-ps2/supertux-ps2

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Force the checkout into the specific directory CMake is looking at
          path: 'supertux-ps2'

      - name: Verify and Build
        run: |
          # Move into the folder where the code actually is
          cd /__w/supertux-ps2/supertux-ps2/supertux-ps2
          
          # If the folder doesn't exist, we fallback to the parent
          if [ ! -f "CMakeLists.txt" ]; then cd ..; fi
          
          echo "Current directory: $(pwd)"
          ls -la
          
          # Create build directory and run CMake
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$PS2DEV/ps2sdk/ps2dev.cmake \
                   -DPLATFORM=PS2 \
                   -DCMAKE_BUILD_TYPE=Release
          
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperTux-PS2-ELF
          path: |
            **/build/*.elf
            **/build/*.irx
