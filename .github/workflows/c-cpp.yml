name: Build SuperTux-PS2

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: 
      image: ps2dev/ps2dev:latest
      # This ensures the container runs as root to avoid permission issues in /__w/
      options: --user root

    steps:
      - name: Install Build Essentials
        run: |
          apk update
          apk add --no-cache git cmake make gcc g++ musl-dev

      # This is the "Magic Fix" for GitHub Actions in Docker containers
      - name: Fix Git Workspace Permissions
        run: git config --global --add safe.directory /__w/supertux-ps2/supertux-ps2

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify File Presence
        run: |
          echo "Checking for CMakeLists.txt..."
          find . -maxdepth 2 -name "CMakeLists.txt"
          ls -la

      - name: Configure CMake
        run: |
          # We use -S . to point to the current directory where checkout happened
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$PS2DEV/ps2sdk/ps2dev.cmake \
            -DPLATFORM=PS2 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Compile
        run: cmake --build build -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperTux-PS2-Build
          path: build/*.elf
