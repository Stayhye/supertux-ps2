name: Build SuperTux-PS2

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - name: Install Git and Build Tools
        run: |
          apk update
          apk add --no-cache git cmake make gcc g++ musl-dev

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug - List Files
        run: |
          pwd
          ls -F

      - name: Configure CMake
        # -S .  means "Source is the current directory"
        # -B build means "Put build files in the build folder"
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$PS2DEV/ps2sdk/ps2dev.cmake \
            -DPLATFORM=PS2 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Compile Project
        run: |
          cmake --build build -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperTux-PS2
          path: |
            build/*.elf
            build/*.irx
